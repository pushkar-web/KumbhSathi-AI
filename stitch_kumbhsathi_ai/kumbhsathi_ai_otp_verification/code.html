<script>
        // OTP Input Logic
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 0 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Timer Logic
        let timeLeft = 120;
        const timerElement = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.parentElement.innerHTML = '<span class="text-success font-medium">Ready to resend</span>';
                resendBtn.disabled = false;
                resendBtn.classList.remove('text-outline-variant', 'cursor-not-allowed');
                resendBtn.classList.add('text-primary', 'hover:underline', 'cursor-pointer');
            } else {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerElement.innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
                timeLeft--;
            }
        }, 1000);
    </script>
