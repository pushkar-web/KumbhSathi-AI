<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center relative bg-cover bg-center" data-alt="A serene twilight scene over a wide river, with the silhouette of a traditional Indian temple on the right bank. The sky gradients from a deep blue at the top to a soft glowing light near the horizon, reflecting smoothly on the gently winding river below, conveying a sense of calm and heritage." style="background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLsvxIqBJ-guNMpqoEC-8AfQ71i-jaDhXfq6UIvvojV5GcjJvaSs6pKsrtaBvPmV-miyfzMWOJQCaNXv_3zcLI7Yc04VB8LceJBV7Q_ToUEBJPeCEx_1Mz-gO3mYlVP4uumFqkmFCC9mYmgnUFUQEOwJvKsWRWQrRuV7nnMTzijDfnbNsNGVYmuPAE_ebgivBlnfZwsF6y1T8TZEvtkKpg2fcuQ6dhG3GdMb_KzyebXSdevggO4y9ATh_Q');">
<div class="absolute inset-0 bg-inverse-surface/40 backdrop-blur-sm z-0"></div>
<main class="w-full max-w-md p-4 z-10">
<div class="bg-surface-container-lowest rounded-xl shadow-xl overflow-hidden flex flex-col border border-outline-variant">
<div class="p-6 pb-2 text-center flex flex-col items-center gap-4">
<img alt="KumbhSathi AI Logo" class="h-16 w-auto object-contain" data-alt="A clean, modern logo featuring a stylized lotus flower above circuit board-like lines, with the text 'KumbhSathi AI' in blue and gold on a white background." src="https://lh3.googleusercontent.com/aida/AP1WRLvHGdYVclQrT0KnrgO91E1FhmW0dOz9GVyzGswa6lwJT9bKauVJYBaAaqECrVHfKfPwqa-a55ERliw5C0UHIWnuBP1IIiT1MrwHB_u2E2xFJlpvyZ9VYb-gH4e4qeBOxiC75zrvf0QY4il28iFbFicZkOX4d7UQMH4--R2pSnGjyMK99xn0BN74EX89px53hSHShq_ly8WGIpiiGWquqijxqp9mACklMzRgWwQgLlvdwPBSCiqb35XnPHg"/>
<div>
<h1 class="font-headline text-2xl font-bold text-primary">Create Account</h1>
<p class="text-on-surface-variant text-sm mt-1">Join the official Kumbh Mela platform</p>
</div>
</div>
<div class="p-6 pt-4 flex-1">
<form class="flex flex-col gap-4">
<div>
<label class="block text-sm font-medium text-on-surface mb-1" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">person</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-sm" id="fullName" placeholder="Enter your full name" required="" type="text"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-on-surface mb-1" for="phone">Phone Number</label>
<div class="flex rounded-lg overflow-hidden border border-outline-variant bg-surface-container-low focus-within:ring-2 focus-within:ring-primary focus-within:border-primary transition-colors">
<div class="bg-surface-container px-3 py-2 flex items-center justify-center border-r border-outline-variant text-on-surface font-medium text-sm">
                                +91
                            </div>
<input class="flex-1 px-3 py-2 bg-transparent border-none text-on-surface focus:ring-0 text-sm" id="phone" pattern="[0-9]{10}" placeholder="10-digit mobile number" required="" type="tel"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-on-surface mb-1" for="email">Email <span class="text-on-surface-variant font-normal">(Optional)</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">mail</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-sm" id="email" placeholder="Enter your email address" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-on-surface mb-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">lock</span>
<input class="w-full pl-10 pr-10 py-2 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-sm" id="password" placeholder="Create a strong password" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium text-on-surface mb-1" for="role">Role</label>
<div class="relative">
<select class="w-full pl-3 pr-8 py-2 appearance-none bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-sm" id="role">
<option value="family">Family / Reporter</option>
<option value="police">Police Officer</option>
<option value="volunteer">Volunteer</option>
<option value="admin">Command Center Admin</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-xl">arrow_drop_down</span>
</div>
</div>
<div>
<label class="block text-sm font-medium text-on-surface mb-1" for="language">Language</label>
<div class="relative">
<select class="w-full pl-3 pr-8 py-2 appearance-none bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-sm" id="language">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
<option value="bn">Bengali</option>
<option value="ta">Tamil</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-xl">arrow_drop_down</span>
</div>
</div>
</div>
<button class="w-full mt-4 bg-primary text-on-primary font-bold py-3 px-4 rounded-lg shadow-md hover:bg-primary-dim transition-all active:scale-95 flex items-center justify-center gap-2 text-base" type="submit">
                        Register
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="text-center mt-2">
<a class="text-sm text-on-surface-variant hover:text-primary font-medium transition-colors" href="#">Already have an account? Login</a>
</div>
</form>
</div>
<div class="bg-surface-container-high py-4 px-6 border-t border-outline-variant flex flex-col items-center justify-center gap-2">
<img alt="Government of India Seal" class="h-10 w-auto object-contain opacity-80" data-alt="The official State Emblem of India featuring the Lion Capital of Ashoka, displayed prominently in gold on a transparent background with the motto 'Satyameva Jayate' written in Devanagari script below it." src="https://lh3.googleusercontent.com/aida/AP1WRLuyjoL4E-sC_NInN48T13mzAb5mEaXdFRY7bkOfXK2BIWCJIizCKhIL3E8PWu8PIGNABsozgIySWfzuoYoEMV_zuk786EVQcDugZairUKzsNWJZRqOzVt8ilFPV0ICci6nhr6eKAPc5PPl3_WaAbAYl9JaUyRZJ7lfK6-fNBASQ_W5SWNgkx1dpnebLbzXOQe8WSXfLvBUr92Hpjzj1st5jGgPiV9AHR6OIZQtCI1r0bkYvb7waZYPqKYQ"/>
<p class="text-xs text-on-surface-variant font-medium tracking-wide">Powered by AI • Ministry of Electronics &amp; IT</p>
</div>
</div>
</main>
</body></html>
