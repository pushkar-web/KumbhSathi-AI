<style>
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px;
            width: 6px;
            background: currentColor;
            border-radius: 50%;
            display: inline-block;
            margin: 0 1px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }

<style>

<body class="bg-background text-on-background font-body h-full flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">

</button>
<div class="flex items-center gap-3">
<div class="relative w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container bg-surface-container-lowest shrink-0">

<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-surface-container-low rounded-full"></div>
</div>
<div>
<h1 class="font-headline text-headline-sm font-semibold text-on-surface dark:text-on-surface-variant tracking-tight">KumbhSathi AI Assistant</h1>
<p class="text-xs text-on-surface-variant flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block animate-pulse"></span>
                        Active Session
                    </p>
</div>
</div>
</div>
<button aria-label="Help" class="p-2 rounded-full text-primary dark:text-primary-fixed-dim hover:bg-surface-container-highest dark:hover:bg-surface-dim transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help</span>
</button>
</header>
<!-- Main Chat Canvas -->
<main class="flex-1 overflow-y-auto pt-20 pb-24 px-4 sm:px-6 flex flex-col gap-6 relative scroll-smooth">
<!-- Timestamp -->
<div class="text-center w-full">
<span class="text-[11px] font-medium text-on-surface-variant bg-surface-container py-1 px-3 rounded-full shadow-sm border border-outline-variant/20 uppercase tracking-wider">Today, 10:42 AM</span>
</div>
<!-- AI Message -->
<div class="flex items-end gap-2.5 max-w-[85%] self-start animate-fade-in-up">
<div class="w-8 h-8 rounded-full overflow-hidden shrink-0 shadow-sm border border-surface-container-highest">

</div>
<div class="flex flex-col gap-1">
<span class="text-xs font-medium text-on-surface-variant ml-1">KumbhSathi AI</span>
<div class="bg-surface-container-lowest text-on-surface p-4 rounded-2xl rounded-bl-sm shadow-sm border border-outline-variant/30 text-sm leading-relaxed relative group">
<p>Namaste. I am KumbhSathi AI. Can you tell me what the missing person was wearing and if they have any visible identifying marks?</p>
</div>
</div>
</div>
<!-- User Message -->
<div class="flex items-end gap-2.5 max-w-[85%] self-end animate-fade-in-up" style="animation-delay: 150ms;">
<div class="flex flex-col gap-1 items-end w-full">
<span class="text-xs font-medium text-on-surface-variant mr-1">You</span>
<div class="bg-primary text-on-primary p-4 rounded-2xl rounded-br-sm shadow-sm text-sm leading-relaxed relative group w-full">
<p>He was wearing a yellow kurta and white dhoti, and has a scar on his left cheek.</p>
<!-- Status ticks -->
<div class="absolute bottom-1 right-2 text-on-primary/70 flex items-center">
<span class="material-symbols-outlined text-[14px]">done_all</span>
</div>
</div>
</div>
</div>
<!-- AI Typing Indicator -->
<div class="flex items-end gap-2.5 max-w-[85%] self-start animate-fade-in-up" style="animation-delay: 300ms;">

</div>
<div class="bg-surface-container-lowest text-on-surface-variant p-4 py-3 rounded-2xl rounded-bl-sm shadow-sm border border-outline-variant/30 flex items-center justify-center min-w-[60px] h-[40px]">
<div class="typing-indicator flex items-center text-primary">
<span></span><span></span><span></span>
</div>
</div>
</div>
</main>
<!-- Bottom Input Area (Replacing BottomNavBar for Chat Context) -->
<div class="fixed bottom-0 w-full bg-surface-container-lowest/90 backdrop-blur-md border-t border-outline-variant/30 p-3 pb-safe z-50">
<div class="max-w-4xl mx-auto flex items-center gap-2 bg-surface-container-low rounded-full pr-1.5 pl-4 py-1.5 shadow-inner focus-within:ring-2 focus-within:ring-primary/50 transition-shadow">
<button aria-label="Attach file" class="text-on-surface-variant hover:text-primary p-2 rounded-full transition-colors active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">attach_file</span>
</button>
<input aria-label="Message input" class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-on-surface placeholder:text-outline py-2.5 outline-none font-body" placeholder="Type your response..." type="text"/>
<div class="flex items-center gap-1">
<button aria-label="Voice input" class="text-primary hover:bg-primary/10 p-2.5 rounded-full transition-colors active:scale-90 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<button aria-label="Send message" class="bg-primary text-on-primary p-2.5 rounded-full hover:bg-primary-dim transition-colors active:scale-90 shadow-sm flex items-center justify-center shadow-[0_2px_8px_rgba(0,94,184,0.3)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
<!-- BottomNav Items as Action Chips (Contextual) -->
<div class="flex justify-center gap-4 mt-3">
<button class="flex items-center gap-1.5 px-4 py-1.5 bg-error-container/20 text-error rounded-full text-xs font-semibold hover:bg-error-container/30 transition-colors border border-error-container/50">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">close</span>
                End Interview
            </button>
</div>
</div>
<style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 1rem);
        }
    </style>
<script>
        // Simple auto-scroll to bottom for chat
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.scrollTop = main.scrollHeight;
        });
    </script>
</body></html>
