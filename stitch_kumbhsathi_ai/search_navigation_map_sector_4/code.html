/* Pulse Animation for Current Location */
@keyframes pulse-ring {
    0% {
        transform: scale(0.8);
        opacity: 0.5;
        } 80% {
        transform: scale(2.5);
        opacity: 0;
        } 100% {
        transform: scale(3);
        opacity: 0;
        }
    }
.pulse-dot::before {
    content: "";
    position: absolute;
    left: -100%;
    top: -100%;
    width: 300%;
    height: 300%;
    background-color: theme("colors.primary");
    border-radius: 50%;
    z-index: -1;
    animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite

<div class="flex items-center gap-3">

<path class="opacity-80" d="M 150 400 Q 250 350 200 250 T 250 120" fill="none" stroke="theme('colors.primary')" stroke-dasharray="8 8" stroke-width="4"></path>
