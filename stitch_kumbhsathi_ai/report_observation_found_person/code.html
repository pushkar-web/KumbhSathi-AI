<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Report Observation - KumbhSathi AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#609efd",
                    "tertiary-fixed": "#ff7004",
                    "primary-fixed": "#609efd",
                    "outline-variant": "#abb3b9",
                    "secondary": "#2c5bb6",
                    "on-surface-variant": "#596065",
                    "secondary-container": "#d9e2ff",
                    "on-tertiary-fixed": "#000000",
                    "on-secondary-fixed": "#003b8d",
                    "secondary-dim": "#1b4fa9",
                    "surface": "#f7f9fc",
                    "on-tertiary-fixed-variant": "#471900",
                    "on-background": "#2c3338",
                    "tertiary-dim": "#8c3a00",
                    "tertiary": "#a04300",
                    "on-secondary-fixed-variant": "#2858b2",
                    "surface-variant": "#dce3e9",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#e9eef3",
                    "inverse-surface": "#0b0f11",
                    "on-error-container": "#6e0a12",
                    "surface-container-highest": "#dce3e9",
                    "surface-container-low": "#f0f4f8",
                    "on-secondary-container": "#194da7",
                    "error-dim": "#67040d",
                    "surface-tint": "#005eb8",
                    "primary-dim": "#0052a2",
                    "background": "#f7f9fc",
                    "error-container": "#fa746f",
                    "error": "#a83836",
                    "secondary-fixed": "#d9e2ff",
                    "secondary-fixed-dim": "#c5d4ff",
                    "surface-dim": "#d4dbe1",
                    "surface-container-high": "#e3e9ee",
                    "inverse-on-surface": "#9a9da0",
                    "primary-fixed-dim": "#5191ee",
                    "on-secondary": "#f9f8ff",
                    "on-tertiary-container": "#371200",
                    "primary-container": "#609efd",
                    "outline": "#747c81",
                    "on-tertiary": "#fff7f5",
                    "on-error": "#fff7f6",
                    "primary": "#005eb8",
                    "on-surface": "#2c3338",
                    "on-primary-fixed": "#000000",
                    "on-primary": "#f8f8ff",
                    "on-primary-fixed-variant": "#002957",
                    "surface-bright": "#f7f9fc",
                    "tertiary-fixed-dim": "#eb6600",
                    "tertiary-container": "#ff7004",
                    "on-primary-container": "#002046"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "display": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        
        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col relative antialiased pt-safe pb-safe selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim text-primary dark:text-primary-fixed font-headline text-headline-sm font-bold fixed top-0 w-full z-50 border-b border-outline-variant dark:border-outline shadow-sm flex items-center justify-between px-4 h-16 w-full pt-safe">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors active:opacity-80">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<span class="text-xl font-black tracking-tight text-primary dark:text-primary-fixed">KumbhSathi AI</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high flex items-center justify-center border border-outline-variant shadow-sm shrink-0">
<img alt="Official Government Seal" class="w-full h-full object-cover p-1" src="https://lh3.googleusercontent.com/aida/AP1WRLuyjoL4E-sC_NInN48T13mzAb5mEaXdFRY7bkOfXK2BIWCJIizCKhIL3E8PWu8PIGNABsozgIySWfzuoYoEMV_zuk786EVQcDugZairUKzsNWJZRqOzVt8ilFPV0ICci6nhr6eKAPc5PPl3_WaAbAYl9JaUyRZJ7lfK6-fNBASQ_W5SWNgkx1dpnebLbzXOQe8WSXfLvBUr92Hpjzj1st5jGgPiV9AHR6OIZQtCI1r0bkYvb7waZYPqKYQ"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-lg mx-auto pt-20 pb-[140px] px-4 sm:px-6 overflow-y-auto no-scrollbar flex flex-col gap-6">
<!-- Page Title & Context -->
<div class="flex flex-col gap-1">
<h1 class="text-2xl font-bold font-headline text-on-surface tracking-tight">Report Observation</h1>
<p class="text-on-surface-variant text-sm font-medium">Log details of a found or observed person.</p>
</div>
<!-- Section 1: Physical Status -->
<section class="flex flex-col gap-3">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-wider font-label">Physical Status</h2>
<div class="grid grid-cols-2 gap-3">
<!-- Status Option: Healthy -->
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" name="physical_status" type="radio" value="healthy"/>
<div class="flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant bg-surface peer-checked:bg-primary-container peer-checked:border-primary-fixed peer-checked:text-on-primary-container text-on-surface-variant transition-all shadow-sm hover:shadow-md">
<span class="material-symbols-outlined text-3xl transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
<span class="font-medium text-sm">Healthy</span>
</div>
</label>
<!-- Status Option: Injured -->
<label class="cursor-pointer group">
<input class="peer sr-only" name="physical_status" type="radio" value="injured"/>
<div class="flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant bg-surface peer-checked:bg-error-container peer-checked:border-error peer-checked:text-on-error-container text-on-surface-variant transition-all shadow-sm hover:shadow-md">
<span class="material-symbols-outlined text-3xl transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1;">local_hospital</span>
<span class="font-medium text-sm">Injured</span>
</div>
</label>
<!-- Status Option: Disoriented -->
<label class="cursor-pointer group">
<input class="peer sr-only" name="physical_status" type="radio" value="disoriented"/>
<div class="flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant bg-surface peer-checked:bg-tertiary-container peer-checked:border-tertiary peer-checked:text-on-tertiary-container text-on-surface-variant transition-all shadow-sm hover:shadow-md">
<span class="material-symbols-outlined text-3xl transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1;">psychology_alt</span>
<span class="font-medium text-sm">Disoriented</span>
</div>
</label>
<!-- Status Option: Unconscious -->
<label class="cursor-pointer group">
<input class="peer sr-only" name="physical_status" type="radio" value="unconscious"/>
<div class="flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant bg-surface peer-checked:bg-error peer-checked:border-error-dim peer-checked:text-on-error text-on-surface-variant transition-all shadow-sm hover:shadow-md">
<span class="material-symbols-outlined text-3xl transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1;">hotel</span>
<span class="font-medium text-sm">Unconscious</span>
</div>
</label>
</div>
</section>
<!-- Section 2: Photo Capture -->
<section class="flex flex-col gap-3">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-wider font-label flex items-center justify-between">
<span>Subject Photo</span>
<span class="text-xs font-normal text-on-surface-variant normal-case bg-surface-container px-2 py-1 rounded-full">Required for AI</span>
</h2>
<button class="w-full aspect-video rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-lowest flex flex-col items-center justify-center gap-3 text-on-surface-variant hover:bg-surface-container-low hover:border-primary-fixed transition-all group overflow-hidden relative shadow-inner" type="button">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-tertiary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container shadow-md group-hover:scale-110 transition-transform duration-300 z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<div class="text-center z-10">
<p class="font-semibold text-on-surface">Tap to Capture / Upload Photo</p>
<p class="text-xs text-on-surface-variant mt-1">Ensure face is clearly visible for accurate matching</p>
</div>
</button>
</section>
<!-- Section 3: Details Form -->
<section class="flex flex-col gap-5 bg-surface-container-lowest p-5 rounded-xl border border-outline-variant shadow-sm">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-wider font-label border-b border-outline-variant pb-2">Identification Details</h2>
<!-- Gender Segmented -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface">Gender</label>
<div class="flex bg-surface-container-low rounded-lg p-1 border border-outline-variant">
<label class="flex-1 text-center cursor-pointer">
<input checked="" class="peer sr-only" name="gender" type="radio" value="male"/>
<div class="py-2 text-sm font-medium rounded-md peer-checked:bg-surface-container-lowest peer-checked:shadow-sm peer-checked:text-primary transition-all text-on-surface-variant">Male</div>
</label>
<label class="flex-1 text-center cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="female"/>
<div class="py-2 text-sm font-medium rounded-md peer-checked:bg-surface-container-lowest peer-checked:shadow-sm peer-checked:text-primary transition-all text-on-surface-variant">Female</div>
</label>
<label class="flex-1 text-center cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="other"/>
<div class="py-2 text-sm font-medium rounded-md peer-checked:bg-surface-container-lowest peer-checked:shadow-sm peer-checked:text-primary transition-all text-on-surface-variant">Other</div>
</label>
</div>
</div>
<!-- Estimated Age Dropdown -->
<div class="flex flex-col gap-2 relative">
<label class="text-sm font-semibold text-on-surface" for="age">Estimated Age Range</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-medium shadow-sm" id="age" name="age">
<option disabled="" selected="" value="">Select age range...</option>
<option value="child_0_5">Child (0-5 yrs)</option>
<option value="child_6_12">Child (6-12 yrs)</option>
<option value="teen">Teenager (13-17 yrs)</option>
<option value="adult">Adult (18-60 yrs)</option>
<option value="senior">Senior (60+ yrs)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Clothing Description -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface" for="clothing">Clothing &amp; Identifiers</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none font-medium text-sm shadow-sm placeholder:text-outline" id="clothing" name="clothing" placeholder="e.g., Red saffron cloth, black rudraksha mala, carrying a small jhola..." rows="3"></textarea>
</div>
</section>
<!-- Section 4: Location Context -->
<section class="bg-secondary-container dark:bg-secondary-dim p-4 rounded-xl border border-secondary-fixed-dim flex items-center justify-between gap-4 shadow-sm relative overflow-hidden">
<!-- Decorative background element -->
<div class="absolute -right-6 -top-6 w-24 h-24 bg-primary-fixed/10 rounded-full blur-xl"></div>
<div class="flex items-start gap-3 relative z-10">
<div class="w-10 h-10 rounded-full bg-surface-container-lowest text-primary flex items-center justify-center shrink-0 shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</div>
<div>
<p class="text-xs font-semibold text-on-secondary-container uppercase tracking-wider font-label mb-0.5">Current Location</p>
<p class="text-sm font-bold text-on-secondary-container">GPS Detected: Sector 4 - Sangam</p>
<p class="text-xs text-on-secondary-container/80 mt-1">Accuracy: ~5 meters</p>
</div>
</div>
<button aria-label="Edit Location" class="w-8 h-8 flex items-center justify-center rounded-full text-primary hover:bg-surface-container-lowest/50 transition-colors shrink-0 relative z-10" type="button">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
</section>
<!-- Footer Spacer for sticky buttons -->
<div class="h-8"></div>
</main>
<!-- Sticky Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-outline-variant px-4 py-4 pb-safe flex flex-col gap-3 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-40">
<button class="w-full flex items-center justify-center gap-2 bg-error hover:bg-error-dim text-on-error font-bold font-headline text-lg py-3.5 px-6 rounded-xl shadow-md transition-all active:scale-[0.98]" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">document_scanner</span>
            Proceed to AI Face Scan
        </button>
<button class="w-full flex items-center justify-center gap-2 bg-transparent border-2 border-primary text-primary hover:bg-primary-container/20 font-bold font-headline py-3 px-6 rounded-xl transition-all active:scale-[0.98]" type="button">
            Report Observation Only
        </button>
<!-- Small Govt Seal in Footer area of sticky bottom -->
<div class="flex justify-center items-center opacity-50 mt-1">
<img alt="Government Seal Footer" class="h-6 w-auto grayscale" src="https://lh3.googleusercontent.com/aida/AP1WRLuyjoL4E-sC_NInN48T13mzAb5mEaXdFRY7bkOfXK2BIWCJIizCKhIL3E8PWu8PIGNABsozgIySWfzuoYoEMV_zuk786EVQcDugZairUKzsNWJZRqOzVt8ilFPV0ICci6nhr6eKAPc5PPl3_WaAbAYl9JaUyRZJ7lfK6-fNBASQ_W5SWNgkx1dpnebLbzXOQe8WSXfLvBUr92Hpjzj1st5jGgPiV9AHR6OIZQtCI1r0bkYvb7waZYPqKYQ"/>
</div>
</div>
</body></html>
