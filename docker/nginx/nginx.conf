# ============================================================
# KumbhSathi AI — Nginx Reverse Proxy (production profile)
# Terminates client traffic and proxies to the FastAPI backend,
# including WebSocket upgrade for the live channels.
# ============================================================
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 15M;   # allow Aadhaar/face image uploads

    upstream backend {
        server backend:8000;
    }

    # Map for WebSocket connection upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # ---- REST API ----
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ---- WebSocket channels ----
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ---- Uploaded media (served by FastAPI StaticFiles) ----
        location /uploads/ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # ---- Health ----
        location /health {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }
    }
}
